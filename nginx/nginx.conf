user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    include /etc/nginx/conf.d/cloudflare-ips.conf;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" host=$host';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    # ── Real client IP from Cloudflare ────────────────────────────────────
    # Without this, all requests appear to come from Cloudflare's IPs
    real_ip_header CF-Connecting-IP;
    # Trust Cloudflare IPs (loaded from cloudflare-ips.conf)
    # Local network also trusted for direct access
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.0/8;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;

    # ── Rate limiting zones ─────────────────────────────────────────────────
    # General: 120 requests per minute per real client IP
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=120r/m;

    # Connection limiting: max 30 concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Return 429 for rate limited requests
    limit_req_status 429;
    limit_conn_status 429;

    # ── Local network detection ─────────────────────────────────────────────
    geo $is_local {
        default 0;
        10.0.0.0/8      1;
        172.16.0.0/12   1;
        192.168.0.0/16  1;
        127.0.0.0/8     1;
    }

    # ── Access control ──────────────────────────────────────────────────────
    # Allow if: local network OR (Cloudflare IP AND valid origin pull cert)
    # $ssl_client_verify is "SUCCESS" when certificate is valid
    map $is_local:$is_cloudflare:$ssl_client_verify $allow_access {
        default                 0;
        "1:0:"                  1;  # Local network, no cloudflare, any cert
        "1:0:NONE"              1;  # Local network, no cloudflare, no cert
        "1:0:SUCCESS"           1;  # Local network, no cloudflare, valid cert
        "1:1:SUCCESS"           1;  # Local + cloudflare + valid cert
        "0:1:SUCCESS"           1;  # Not local, cloudflare IP, valid cert
    }

    # ── DDoS protection ────────────────────────────────────────────────────
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Internal health check (port 80, no TLS) ────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location /health {
            return 200 "ok";
            add_header Content-Type text/plain;
            access_log off;
        }

        location / {
            return 444;
        }
    }

    # ── Default HTTPS — drop unknown domains ───────────────────────────────
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;

        # Self-signed fallback so nginx starts even with no sites.
        # Generated by setup.sh on first run.
        ssl_certificate     /etc/nginx/ssl/fallback.crt;
        ssl_certificate_key /etc/nginx/ssl/fallback.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        return 444;
    }

    # ── Per-site configs ───────────────────────────────────────────────────
    include /etc/nginx/sites/*.conf;
}
