user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    include /etc/nginx/conf.d/cloudflare-ips.conf;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" host=$host';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    # ── Real client IP from Cloudflare ────────────────────────────────────
    # Replaces $remote_addr with the real client IP from CF-Connecting-IP.
    # $realip_remote_addr preserves the original connecting IP (Cloudflare's).
    # The geo blocks below use $realip_remote_addr so they check the
    # original connecting address, not the replaced one.
    real_ip_header CF-Connecting-IP;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.0/8;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;

    # ── Rate limiting zones ─────────────────────────────────────────────────
    # Uses $remote_addr which is now the real client IP (after real_ip_header)
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=120r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_req_status 429;
    limit_conn_status 429;

    # ── Cloudflare / local detection ──────────────────────────────────────
    # Use $realip_remote_addr (the original connecting IP before real_ip
    # replaced it) so we check whether Cloudflare or local network connected.
    geo $realip_remote_addr $is_local {
        default 0;
        10.0.0.0/8      1;
        172.16.0.0/12   1;
        192.168.0.0/16  1;
        127.0.0.0/8     1;
    }

    # $is_cloudflare comes from cloudflare-ips.conf which uses plain `geo`.
    # We need it to also use $realip_remote_addr. Override it here.
    geo $realip_remote_addr $is_cloudflare_real {
        default 0;
        173.245.48.0/20 1;
        103.21.244.0/22 1;
        103.22.200.0/22 1;
        103.31.4.0/22 1;
        141.101.64.0/18 1;
        108.162.192.0/18 1;
        190.93.240.0/20 1;
        188.114.96.0/20 1;
        197.234.240.0/22 1;
        198.41.128.0/17 1;
        162.158.0.0/15 1;
        104.16.0.0/13 1;
        104.24.0.0/14 1;
        172.64.0.0/13 1;
        131.0.72.0/22 1;
        2400:cb00::/32 1;
        2606:4700::/32 1;
        2803:f800::/32 1;
        2405:b500::/32 1;
        2405:8100::/32 1;
        2a06:98c0::/29 1;
        2c0f:f248::/32 1;
    }

    # ── Access control ──────────────────────────────────────────────────────
    # Allow if: local network OR (Cloudflare IP AND valid origin pull cert)
    map $is_local:$is_cloudflare_real:$ssl_client_verify $allow_access {
        default                 0;
        "1:0:"                  1;  # Local network, any cert status
        "1:0:NONE"              1;
        "1:0:SUCCESS"           1;
        "1:1:SUCCESS"           1;  # Local + cloudflare + valid cert
        "0:1:SUCCESS"           1;  # Cloudflare IP + valid cert
    }

    # ── DDoS protection ────────────────────────────────────────────────────
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Internal health check (port 80, no TLS) ────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location /health {
            return 200 "ok";
            add_header Content-Type text/plain;
            access_log off;
        }

        location / {
            return 444;
        }
    }

    # ── Default HTTPS — drop unknown domains ───────────────────────────────
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/fallback.crt;
        ssl_certificate_key /etc/nginx/ssl/fallback.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        return 444;
    }

    # ── Per-site configs ───────────────────────────────────────────────────
    include /etc/nginx/sites/*.conf;
}
